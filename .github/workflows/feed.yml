name: Update startup feed

on:
  schedule:
    - cron: '30 2 * * *'   # daily, 08:00 IST
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scan startup news
        run: node scripts/update-feed.js
      - name: Scan school news
        run: node scripts/update-school-news.js
      - name: Commit if changed
        run: |
          git config user.name "sie-feed-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet data/startup-feed.json data/school-news-feed.json; then
            git add data/startup-feed.json data/school-news-feed.json
            git commit -m "chore: refresh news feeds [bot]"
            git push
          else
            echo "Feeds unchanged."
          fi

  # Bot pushes can't trigger the deploy workflow (GITHUB_TOKEN pushes don't fire
  # other workflows), so this workflow deploys Pages itself after each scan.
  build:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (with repo base path for Pages)
        run: BASE_PATH="/${{ github.event.repository.name }}" npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
